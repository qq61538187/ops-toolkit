services:
  mysql57:
    image: mysql:5.7
    # 容器名可通过 .env 覆盖，未设置时回退默认，便于多实例部署
    container_name: ${MYSQL57_CONTAINER_NAME:-mac-devbox-mysql57}
    # .env 与本文件同目录，Compose 会自动加载；显式声明便于阅读
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL57_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL57_DATABASE}
      MYSQL_USER: ${MYSQL57_USER}
      MYSQL_PASSWORD: ${MYSQL57_PASSWORD}
    ports:
      - "${MYSQL57_PORT}:3306"
    volumes:
      # 数据目录位于本 compose 同级的 ./volumes 下
      - ./volumes/data:/var/lib/mysql
      - ./volumes/backup:/backup
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - shared

networks:
  # 共享网络：多个应用/nginx 容器加入同名网络即可互访。
  # name 固定为变量值，不加项目前缀；首个启动的 compose 会创建它，其余复用。
  shared:
    name: ${MYSQL57_NETWORK_NAME:-devbox-shared-net}
    driver: bridge
