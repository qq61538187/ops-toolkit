# 默认 HTTP 服务器配置
server {
    listen 80;
    listen [::]:80;
    server_name localhost _;
    # 使用相对重定向，避免目录补斜杠时丢失宿主机映射端口
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html index.htm index.php;

    # 基本安全头
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 目录补斜杠时保留 Host 头中的端口（例如 localhost:12080）
    location = /report/design {
        return 301 $scheme://$http_host/report/design/;
    }

    # report-design 入口页固定到新目录 index，避免落到站点根 index
    location = /report/design/ {
        try_files /zy-lowcode/dist/index.html =404;
    }

    # report-design 静态资源映射到新目录，不存在时直接 404
    location ^~ /report/design/ {
        alias /usr/share/nginx/html/zy-lowcode/dist/;
        try_files $uri $uri/ =404;
    }


    # 主要位置配置
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # 静态资源缓存配置
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        add_header Vary Accept-Encoding;
        access_log off;
        
        # 字体文件跨域支持
        if ($uri ~* \.(woff|woff2|ttf|eot)$) {
            add_header Access-Control-Allow-Origin *;
        }
    }

    # 隐藏敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # 禁止访问备份文件
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # 禁止访问配置和敏感文件
    location ~* \.(conf|config|ini|log|sh|sql|bak|backup|swp|tmp|htaccess|htpasswd)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # 防止目录遍历
    location ~* \.\./\.\. {
        deny all;
        return 403;
    }
    # API 健康检查（JSON格式）
    location /api/health {
        access_log off;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601","server":"$hostname"}';
        add_header Content-Type application/json;
    }

    # 监控端点（仅内网访问）
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # 错误页面配置
    error_page 403 /403.html;
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /403.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # 日志配置 - 基于server_name目录结构
    access_log /var/log/nginx/localhost/access.log main;
    error_log /var/log/nginx/localhost/error.log;
}
